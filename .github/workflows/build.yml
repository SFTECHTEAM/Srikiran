name: Build Srikiran EXE + APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # =========================
  # WINDOWS EXE BUILD
  # =========================
  build-exe:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web (if required)
        run: npm run build
        continue-on-error: true

      - name: Build Electron EXE
        run: npm run electron:build

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Srikiran-Windows-EXE
          path: |
            dist/*.exe
            release/*.exe
            out/*.exe


  # =========================
  # ANDROID APK BUILD
  # =========================
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: npm ci

      - name: Install Capacitor (if not in package.json)
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Web App
        run: npm run build

      # IMPORTANT:
      # Capacitor should ALREADY be initialized locally.
      # DO NOT run cap init inside CI.
      # Just sync.

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Srikiran-Android-APK
          path: android/app/build/outputs/apk/debug/*.apk
